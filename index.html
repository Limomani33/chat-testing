<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Soapy Chat</title>

<style>
html,body{
  height:100%;
  margin:0;
  background:#0b0507;
  font-family:system-ui;
  color:#ffdddd;
}

#app{
  width:720px;
  height:90vh;
  margin:20px auto;
  background:#140709;
  border:2px solid #ff3333;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  clip-path:polygon(0 0,100% 0,100% 100%,20px 100%,0 calc(100% - 20px));
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
  background:#1a0a0c;
}

.msg{margin-bottom:8px}
.name{color:#ff5555;font-weight:bold}

input,button{
  background:#1a0a0c;
  color:#ffdddd;
  border:1px solid #ff3333;
  padding:8px;
  clip-path:polygon(0 0,100% 0,100% 100%,15px 100%,0 calc(100% - 15px));
}

button{
  cursor:pointer;
  background:linear-gradient(135deg,#ff3333,#7a0000);
}

#error{
  color:#ff4444;
  font-weight:bold;
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:flex;
  align-items:center;
  justify-content:center;
}

#modalBox{
  background:#140709;
  border:2px solid #ff3333;
  padding:20px;
  width:360px;
  clip-path:polygon(0 0,100% 0,100% 100%,20px 100%,0 calc(100% - 20px));
}
a{color:#ff7777}
</style>
</head>

<body>

<div id="modal">
  <div id="modalBox">
    <h3 id="modalTitle">Enter your PHID</h3>
    <input id="phidInput" placeholder="PHID"><br><br>
    <button onclick="submitPHID()">Continue</button><br><br>
    <a href="https://phid-accpanel.onrender.com" target="_blank">
      Sign up / Sign in
    </a>
    <div id="modalMsg"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div>
    <input id="text" placeholder="Message (max 300 chars)">
    <button onclick="send()">Send</button>
    <span id="error"></span>
  </div>
  <div id="chat"></div>
</div>

<script>
const chat = document.getElementById("chat");
const errorEl = document.getElementById("error");
const modal = document.getElementById("modal");
const modalMsg = document.getElementById("modalMsg");

let ws;
let username = localStorage.getItem("username");

function startChat(){
  modal.style.display="none";
  document.getElementById("app").style.display="flex";

  ws = new WebSocket(
    `${location.protocol==="https:"?"wss":"ws"}://${location.host}/ws`
  );

  ws.onopen = () => {
    ws.send(JSON.stringify({type:"join",name:username}));
  };

  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if(m.type==="history") m.messages.forEach(add);
    else if(m.type==="error") errorEl.textContent=m.message;
    else add(m);
  };
}

function add(m){
  const d=document.createElement("div");
  d.className="msg";
  d.innerHTML=`<span class="name">${m.name}:</span> ${m.content}`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function send(){
  const t=document.getElementById("text");
  if(t.value.length>300){
    errorEl.textContent="Max 300 characters";
    return;
  }
  ws.send(JSON.stringify({type:"message",content:t.value}));
  t.value="";
  errorEl.textContent="";
}

async function submitPHID(){
  const phid=document.getElementById("phidInput").value;
  const r=await fetch("/check_phid",{method:"POST",body:JSON.stringify({phid})});
  const d=await r.json();

  if(!d.ok){
    modalMsg.textContent="Invalid PHID";
    return;
  }

  modalMsg.innerHTML=`
    Is this you?<br>
    Username: <b>${d.username}</b><br><br>
    <button onclick="confirmUser('${d.username}')">Yes</button>
  `;
}

function confirmUser(u){
  localStorage.setItem("username",u);
  username=u;
  startChat();
}

if(username) startChat();
</script>

</body>
</html>
